[build]
builder = "dockerfile"

[[services]]
name = "bitiqlab-backend"
dockerfile = "backend.Dockerfile"
buildContext = "."

[[services]]
name = "tradingview-mcp"
dockerfile = "Dockerfile.mcp"
buildContext = "."

[services.bitiqlab-backend.variables]
NEXT_PUBLIC_API_URL = "${{ services.bitiqlab-backend.public_url }}"
TRADINGVIEW_MCP_URL = "${{ services.tradingview-mcp.internal_url }}"

[services.tradingview-mcp.variables]
NODE_ENV = "production"
